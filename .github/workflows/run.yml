name: GME Remit Payout

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD)'
        required: true
      end_date:
        description: 'End date (YYYY-MM-DD)'
        required: true
      upload_s3:
        description: 'Upload to S3 (true/false)'
        required: false
        default: 'false'

jobs:
  run-gme:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright openpyxl boto3
          playwright install chromium
          playwright install-deps chromium

      - name: Run GME automation
        env:
          GME_USERNAME:          ${{ secrets.GME_USERNAME }}
          GME_PASSWORD:          ${{ secrets.GME_PASSWORD }}
          GME_HEADLESS:          "true"
          START_DATE:            ${{ inputs.start_date }}
          END_DATE:              ${{ inputs.end_date }}
          UPLOAD_S3:             ${{ inputs.upload_s3 }}
          S3_BUCKET:             ${{ secrets.S3_BUCKET }}
          S3_PREFIX:             ${{ secrets.S3_PREFIX }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python GME.py

      - name: Upload downloaded Excel as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gme-downloads-${{ inputs.start_date }}_${{ inputs.end_date }}
          path: gmeremit_downloads/
          retention-days: 7

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gme-screenshots
          path: gmeremit_screenshots/
          retention-days: 7
