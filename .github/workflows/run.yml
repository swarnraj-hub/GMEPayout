name: GME Remit Payout

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD)'
        required: true
      end_date:
        description: 'End date (YYYY-MM-DD)'
        required: true
      upload_s3:
        description: 'Upload to S3 (true/false)'
        required: false
        default: 'false'

jobs:
  run-gme:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright openpyxl
          playwright install chromium
          playwright install-deps chromium

      - name: Run GME automation
        env:
          GME_USERNAME: ${{ secrets.GME_USERNAME }}
          GME_PASSWORD: ${{ secrets.GME_PASSWORD }}
          GME_HEADLESS: "true"
          START_DATE:   ${{ inputs.start_date }}
          END_DATE:     ${{ inputs.end_date }}
        run: python GME.py

      - name: List downloaded files
        run: |
          echo "Files in gmeremit_downloads/:"
          ls -lh gmeremit_downloads/ || echo "Directory is empty or missing"

      - name: Check download folder is not empty
        if: ${{ inputs.upload_s3 == 'true' }}
        run: |
          count=$(find gmeremit_downloads/ -maxdepth 1 -type f | wc -l)
          echo "Files found: $count"
          if [ "$count" -eq 0 ]; then
            echo "ERROR: No files downloaded — aborting S3 upload."
            exit 1
          fi

      - name: Upload to S3
        if: ${{ inputs.upload_s3 == 'true' }}
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ap-southeast-1
        run: |
          echo "Uploading to s3://payout-recon/gme/raw_xlsx/"
          aws s3 cp gmeremit_downloads/ s3://payout-recon/gme/raw_xlsx/ --recursive
          echo "Upload complete"

      - name: Upload Excel as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gme-downloads-${{ inputs.start_date }}_${{ inputs.end_date }}
          path: gmeremit_downloads/
          retention-days: 7

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gme-screenshots
          path: gmeremit_screenshots/
          retention-days: 7
